---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetflow-web
  namespace: meetflow
  labels:
    app: meetflow-web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: meetflow-web
  template:
    metadata:
      labels:
        app: meetflow-web
    spec:
      # Anti-affinity to spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - meetflow-web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: web
          image: meetflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: meetflow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meetflow-secrets
                  key: database-url
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meetflow-secrets
                  key: deepgram-api-key
            - name: WORKSPACE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: meetflow-secrets
                  key: workspace-encryption-key
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
