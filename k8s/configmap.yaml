---
apiVersion: v1
kind: ConfigMap
metadata:
  name: meetflow-config
  namespace: meetflow
data:
  NODE_ENV: production
  LOG_LEVEL: info
  LISTEN_PORT: "3000"
  SIGNALING_PORT: "3001"
  MEDIASOUP_DESIRED_PORT: "40000"
  MEDIASOUP_LISTEN_IP: "0.0.0.0"
  # Optional: specify a specific GPU encoder (h264_nvenc, h264_vaapi, h264_videotoolbox, or leave unset for auto-detect)
  # RECORDING_GPU_ENCODER: "h264_nvenc"
  # Database connection string must be provided via secrets
  # Deepgram API key must be provided via secrets
  # Workspace encryption key must be provided via secrets
