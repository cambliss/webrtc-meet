services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: video-meeting-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-video_meeting}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-meeting

  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-meeting-web
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-video_meeting}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      APP_URL: ${APP_URL}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      NEXT_PUBLIC_SIGNALING_URL: ${NEXT_PUBLIC_SIGNALING_URL}
      SIGNALING_INTERNAL_URL: http://signaling:4000
      SERVICE_AUTH_SIGNING_SECRET: ${SERVICE_AUTH_SIGNING_SECRET:-dev-secret-key-change-in-production}
      SERVICE_AUTH_MODE: ${SERVICE_AUTH_MODE:-local}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      INR_TO_USD_RATE: ${INR_TO_USD_RATE:-0.012}
      RAZORPAY_KEY: ${RAZORPAY_KEY_ID}
      RAZORPAY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      signaling:
        condition: service_healthy
    networks:
      - video-meeting
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # WebRTC Signaling Server
  signaling:
    build:
      context: .
      dockerfile: Dockerfile.signaling
    container_name: video-meeting-signaling
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-video_meeting}
      SERVICE_AUTH_SIGNING_SECRET: ${SERVICE_AUTH_SIGNING_SECRET:-dev-secret-key-change-in-production}
      SERVICE_AUTH_MODE: ${SERVICE_AUTH_MODE:-local}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - video-meeting
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  video-meeting:
    driver: bridge
